{% extends 'tracker/base.html' %}

{% block content %}
<h2 class="mb-4">Delete Study Session</h2>

<p>Are you sure you want to delete <strong>{{ session.title }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'study_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
